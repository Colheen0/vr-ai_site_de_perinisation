<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil</title>
    <link rel="stylesheet" href="styles/styles.css">
    <link href="https://db.onlinewebfonts.com/c/0d2e0589d03cfc34ae25f7e045ec3a8f?family=SquareSerif-Demi" rel="stylesheet">
    <link href="https://db.onlinewebfonts.com/c/fb69990708893276bdb20a98eb2e06d3?family=General+Sans+Semibold" rel="stylesheet">
    <link href="https://db.onlinewebfonts.com/c/25c8b884ca555f338df57a70ee6d539c?family=General+Sans+Medium" rel="stylesheet">
    <link href="https://db.onlinewebfonts.com/c/7887c87ae42c25319906eb657546f4b4?family=General+Sans+Extralight" rel="stylesheet">
</head>
<body>
    <button
    type="button"
    data-theme-toggle
    aria-label="Change to light theme"
  >Changer de thème</button>
    <button class="btn">
        test
    </button>

    <button class="btn" disabled>
        disabled
    </button>
    <script src="scripts/theme-toggle.js"></script>

    <span class="alert info">
        test
    </span>

    <span class="alert error">
        test
    </span>

    <div class="input">
        <h2>Card Title</h2>
        <p>Card content goes here.</p>
        <div class="lien">
            <a href="">Lien test</a>
        </div>
    </div>

    <form action="" class="form-container">
        <div class="input-group">
            <input type="text" name="name" id="name" placeholder="Nom*" class="form-input">
            <label for="name"></label>
        </div>
        
        <div class="input-group">
            <input type="email" name="email" id="email" placeholder="adresse mail*" class="form-input">
            <label for="email"></label>
            <span class="error-message"></span>
        </div>
        <div class="input-group">
            <input type="text" name="subject" id="subject" placeholder="Sujet*" class="form-input">
            <label for="subject"></label>
        </div>
        <div class="input-group">
            <input type="text" name="message" id="message" placeholder="Message*" class="form-input form-textarea">
            <label for="message"></label>
        </div>
        <input type="submit" value="send" class="btn">
    </form>
</body>
</html>
